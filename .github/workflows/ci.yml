name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-build:
    name: Test, build, and Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Admin Next dependencies
        if: hashFiles('apps/admin-next/package-lock.json') != ''
        run: npm ci --prefix apps/admin-next

      - name: Run tests
        run: npm test

      - name: Run Admin Next tests
        if: hashFiles('apps/admin-next/package-lock.json') != ''
        run: npm --prefix apps/admin-next test

      - name: Build web apps
        run: npm run build

      - name: Build Admin Next
        if: hashFiles('apps/admin-next/package-lock.json') != ''
        run: npm --prefix apps/admin-next run build

      - name: Build API Docker image
        run: docker build --target runtime -t agenda-luna-mandala-api:ci .
